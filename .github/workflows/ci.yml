name: Node.js CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      PORT: 3001
      AWS_ACCESS_KEY_ID: dummy
      AWS_SECRET_ACCESS_KEY: dummy
      AWS_REGION: ap-south-1
      AWS_BUCKET_NAME: dummy-bucket

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Start server and test
        run: |
          node app.js &
          SERVER_PID=$!

          echo "Waiting for server..."
          for i in {1..10}; do
            curl -s http://localhost:3001 && break
            sleep 2
          done

          curl --fail http://localhost:3001

          kill $SERVER_PID